<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Empire - home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <section id="popup">
        <img class="personaje-popup" src="../img/gato.png" alt="">
        <form class="form-nombre">
            <label for="">Ingresa tu nombre:</label>
            <input type="text" id="input-nombre">
            <button type="button" onclick="cerrarPopup()">Confirmar</button>
        </form>
    </section>
    <main class="bru">
        <section id="game-screen" class="contenedor screens">
           <section class="cabecera">
                <section class="circulo"></section>
                <section class="circulo"></section>
            </section>
            <section class="container-audio-moneda d-flex justify-content-between align-items-center">
                <section>
                    <img id="audio" src="../img/audio-muted.png" alt="">
                     <audio id="audio-background" loop>
                    <source src="../audio/background-music.mp3">
                     </audio>
                </section>
                <section class="container-moneda d-flex flex-row gap-2 ">
                    <img id="moneda" src="../img/moneda.png" alt="">
                    <p id="dinero"></p>
                </section>
            </section>
            <section class="contenido-principal">
                <section id="menu-home">
                    <section id="menuReal">
                        <section class="cabeceraMenu border-bottom d-flex justify-content-center aling-items-center">
                            <h2>Menú</h2>
                        </section>
                        <ol>
                            <li onclick="verInventario()" id="inventario">Ver Inventario</li>
                            <li  id="insumos">Comprar Insumos</li>
                            <li id="venderBebidas">Vender Bebidas</li>
                            <li><a href="../index.html">Volver al inicio</a></li>
                        </ol>
                    </section>
                   <section id="dialogo">
                        <img class="personaje" src="../img/gato.png" alt="">
                        <p id="mensaje"></p>
                        <audio id="audio-notificacion">
                            <source src="../audio/notificacion.mp3">
                        </audio>
                    </section>
                </section>
                <section class="imagen-menu">
                    <img id="tienda-jugos" src="../img/juice-shop.png" alt="">
                    <img class="arbolUno d-none d-lg-block position-absolute end-0" src="../img/arbolUno.png">
                </section>
            </section>
            <section id="tienda-distribuidor" class="screens">
            </section>
            <section class="d-none d-lg-block p-5 border-top"></section>
        </section>
    </main>
    <img id="arbolDos" class="arbolDos bru" src="../img/arbolDos.png" alt="">
    <img class="cielo bru" src="../img/cielo.png" alt="">
    <img class="cesped bru" src="../img/cesped.png" alt="">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../javaScript/audio.js"></script>
    <script src="../javaScript/storage.js"></script>
    <script src="../javaScript/logic.js"></script>
    <script src="../javaScript/ui.js"></script>
    <script src="../javaScript/main.js"></script>
    
</body>
</html>
