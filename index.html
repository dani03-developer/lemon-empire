<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Empire - Inicio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
     <section id="popup" class="desactive">
        <img class="personaje-popup" src="./img/gato.png" alt="">
        <form class="form-nombre">
            <label for="">Ingresa tu nombre:</label>
            <input type="text" id="input-nombre">
            <button type="button" onclick="cerrarPopup()">Confirmar</button>
        </form>
    </section>
    <main>
        <section id="main-screen" class="contenedor screens">
           <section class="cabecera">
                <section class="circulo"></section>
                <section class="circulo"></section>
            </section>
            <section class="container-audio">
                <img class="audio" src="./img/audio-muted.png" alt="">
                <audio id="audio-background" loop>
                    <source src="./audio/background-music.mp3">
                </audio>
            </section>
            <section class="contenido-principal">
             <section id="menu">
                <h1>Lemon Empire <img class="limon-titulo" src="./img/limon.png" alt=""></h1>
                <section class="botones">
                        <a class="boton-menu" id="boton-start" onclick="start()">Start</a>
                        <a class="boton-menu" id="boton-manual">¿Cómo jugar?</a>
                        <a class="boton-menu" id="boton-salir" onclick="salir()">Salir</a>
                </section>
            </section>
            <section class="imagen-menu">
                <img id="tienda-jugos" src="./img/juice-shop.png" alt="">
                <img class="arbolUno d-none d-lg-block position-absolute end-0" src="./img/arbolUno.png">
            </section>
            </section>
            <section class="d-none d-lg-block p-5 border-top"></section>
        </section>
        <!--CAMBIO DE PANTALLA DIAS-->
         <section id="day-screen" class="contenedor screens">
           <section class="cabecera">
                <section class="circulo"></section>
                <section class="circulo"></section>
            </section>
            <section class="contenedor-principal-dias">
                <h1 id="dias"></h1>
            </section>
        </section>
        <!--CAMBIO DE PANTALLA-->
         <section id="game-screen" class="contenedor screens">
           <section class="cabecera">
                <section class="circulo"></section>
                <section class="circulo"></section>
            </section>
            <section class="container-audio-moneda d-flex justify-content-between align-items-center">
                <section>
                    <img class="audio" src="./img/audio-muted.png" alt="">
                </section>
                <section class="container-moneda d-flex flex-row gap-2 ">
                    <img id="moneda" src="./img/moneda.png" alt="">
                    <p class="dinero"></p>
                </section>
            </section>
            <section class="contenido-principal">
                <section id="menu-home">
                    <section id="menuReal">
                        <section class="cabeceraMenu border-bottom d-flex justify-content-center aling-items-center">
                            <h2>Menú</h2>
                        </section>
                        <ol>
                            <li class="btn-game" onclick="verInventario()" id="inventario">Ver Inventario</li>
                            <li class="btn-game" onclick="tiendaDistribuidor()"  id="insumos">Comprar Insumos</li>
                            <li class="btn-game" onclick= "venderBebidas()" id="venderBebidas">Vender Bebidas</li>
                            <li class="btn-game" onclick= "volverInicio()">Volver al inicio</li>
                        </ol>
                    </section>
                   <section id="dialogo">
                        <img class="personaje" src="./img/gato.png" alt="">
                        <p id="mensaje"></p>
                        <audio id="audio-notificacion">
                            <source src="./audio/notificacion.mp3">
                        </audio>
                    </section>
                </section>
                <section class="imagen-menu">
                    <img id="tienda-jugos" src="./img/juice-shop.png" alt="">
                    <img class="arbolUno d-none d-lg-block position-absolute end-0" src="./img/arbolUno.png">
                </section>
            </section>
            <section class="d-none d-lg-block p-5 border-top"></section>
        </section>

        <!--CAMBIO DE PANTALLA DISTRIBUIDOR-->
        <section id="tienda-distribuidor" class="contenedor screens">
                 <section class="cabecera">
                <section class="circulo"></section>
                <section class="circulo"></section>
            </section>
            <section class="container-audio-moneda d-flex justify-content-between align-items-center">
                <section>
                    <img class="audio" src="./img/audio-muted.png" alt="">
                </section>
                <section class="d-flex flex-row gap-2">
                    <section class="container-carrito position-relative">
                    <img id="carrito" src="./img/carritoDeCompras.png" alt="">
                    <section id="cantidad-carrito" class="position-absolute">
                        <p>0</p>
                    </section>
                </section>
                <section class="container-moneda d-flex flex-row gap-2 ">
                    <img id="moneda" src="./img/moneda.png" alt="">
                    <p class="dinero"></p>
                </section>
                </section>
                
            </section>

             <section class="contenido-principal">
                    <section class="primeraSeccion">
                            <section class="seccionDialogo">
                                <section id="dialogo-distribuidor">
                                <img class="personaje" src="./img/oso.png" alt="">
                                <p id="mensaje-distribuidor"></p>
                                <audio id="audio-notificacion">
                                    <source src="./audio/notificacion.mp3">
                                </audio>
                                </section>
                            </section>
                         <section class="botonVerCatalogo d-lg-none">
                        <a id="boton-catalogo" onclick="verProductosDistribuidor()">Ver Catálogo</a>
                        </section>
                        <section class="imagen-menu">
                            <img id="tienda-jugos" src="./img/distribuidor.png" alt="">
                        </section>
                    </section>
                  <section id="segundaSeccion" class="desactive">
                        
                  </section>
            </section>
            <section class="d-none d-lg-block p-5 border-top"></section>


        </section>
         <!--CAMBIO DE PANTALLA VENTA DE BEBIDAS-->
        <section id="vender-bebidas" class="contenedor screens">
           <section class="cabecera">
                <section class="circulo"></section>
                <section class="circulo"></section>
            </section>
            
            <section class="container-audio-moneda d-flex justify-content-between align-items-center">
                <section class="d-flex gap-3 align-items-start">
                    <img class="audio" src="./img/audio-muted.png" alt="">
                    <img class="home" onclick="backHome()" src="./img/home.png" alt="">
                </section>
                <section class="container-moneda d-flex flex-row gap-2 ">
                    <img id="moneda" src="./img/moneda.png" alt="">
                    <p id="dinero-noche" class="dinero"></p>
                </section>
            </section>
            <section class="luna hidden">
                    <img src="./img/luna.png" alt="">
                </section>
                <section class="contenedor-principal-ventas d-flex flex-grow-1 flex-column justify-content-center align-items-center position-relative">
                    <section class="seccionDialogo d-flex flex-grow-1 justify-content-center align-items-center">
                        <section id="dialogo-despedida" class="hidden">
                            <img class="personaje" src="./img/gato.png" alt="">
                            <p id="mensaje-despedida"></p>
                            <audio id="audio-notificacion">
                                <source src="./audio/notificacion.mp3">
                             </audio>
                    </section>
                    <section id="dialogo-clientes">
                        <img class="personaje" src="" alt="">
                        <p id="mesaje-cliente"></p>
                        <audio id="audio-notificacion">
                            <source src="./audio/notificacion.mp3">
                        </audio>
                    </section>
                </section>
                <section class="btnPasarDia hidden d-flex flex-grow-1 justify-content-center w-100">
                        <a id="boton-pasar-dia" onclick="pasarDia()">Pasar de Día</a>
                </section>
                <section class=" d-flex flex-grow-1 justify-content-center align-items-end gap-3">
                     <img class="d-none d-lg-block" src="./img/arbolDos.png" alt="">
                    <img id="tienda-jugos-venta" src="./img/juice-shop.png" alt="">
                     <img class="d-none d-lg-block" src="./img/arbolUno.png" alt="">
                </section>
            </section>
             <section class="d-none d-lg-block p-5 border-top"></section>
           </section>


        </section>
    </main>
    <img id="arbolDos" src="./img/arbolDos.png" alt="">
    <img class="cielo" src="./img/cielo.png" alt="">
    <img class="cesped" src="./img/cesped.png" alt="">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script src="../javaScript/audio.js"></script>
    <script src="../javaScript/storage.js"></script>
    <script src="../javaScript/logic.js"></script>
    <script src="../javaScript/ui.js"></script>
    <script src="../javaScript/main.js"></script>
    

</body>
</html>
